<!DOCTYPE html>
<!-- 
  ============================================================
  IPHONE CLONE - Built with pure HTML, CSS, and JavaScript
  No images used — everything is CSS shapes, gradients, and icons
  ============================================================
-->
<html lang="en">

<head>
  <!-- 
    META CHARSET: Tells the browser what character encoding to use.
    UTF-8 supports almost all characters in the world.
  -->
  <meta charset="UTF-8" />

  <!-- 
    META VIEWPORT: CRITICAL for mobile-like layouts.
    - width=device-width: makes the page width match the screen width
    - initial-scale=1.0: no zoom on load
    Without this, browsers zoom out and shrink everything.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>iPhone Clone</title>

  <!-- 
    GOOGLE FONTS: We're importing the SF Pro-like font "Nunito" for clean display.
    This is loaded externally — no local file needed.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <!-- 
    FONT AWESOME: A CSS icon library.
    We use this instead of images for all icons (wifi, battery, apps, etc.)
    The CDN link loads it from the internet — no installation needed.
  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ============================================================
       CSS RESET & BASE STYLES
       A "reset" removes browser default styles so we start fresh.
       Different browsers have different defaults — this makes it consistent.
    ============================================================ */
    * {
      /* 
        box-sizing: border-box
        By default, width/height DON'T include padding or border.
        border-box makes width/height INCLUDE them — much more intuitive.
        Example: a 100px wide div with 10px padding stays 100px wide.
      */
      box-sizing: border-box;
      margin: 0;   /* Remove default spacing around elements */
      padding: 0;  /* Remove default inner spacing */
    }

    /* ============================================================
       CSS CUSTOM PROPERTIES (Variables)
       Defined inside :root so they're available EVERYWHERE.
       Use var(--name) to reference them.
       Great for theming — change one place, updates everywhere.
    ============================================================ */
    :root {
      --phone-width: 320px;
      --phone-height: 660px;
      --phone-radius: 44px;
      --status-bar-height: 44px;

      /* Color tokens */
      --wallpaper-top: #f5a623;
      --wallpaper-mid: #e8533a;
      --wallpaper-bottom: #6b3fa0;

      --dark-bg: #1c1c1e;
      --glass: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.25);
    }

    /* ============================================================
       BODY — the full page wrapper
    ============================================================ */
    body {
      /* 
        Flexbox: A layout model that lines things up easily.
        display: flex        → activates flexbox on the container
        justify-content      → horizontal alignment
        align-items          → vertical alignment
        min-height: 100vh    → fills full viewport height (vh = viewport height)
      */
      display: flex;
      justify-content: center;  /* Center horizontally */
      align-items: center;      /* Center vertically */
      min-height: 100vh;
      gap: 60px;                /* Space between the two phones */

      /* CSS gradient background for the page */
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Nunito', sans-serif;

      /* Subtle dot grid pattern using radial-gradient */
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-size: 30px 30px, cover;
    }

    /* ============================================================
       PHONE WRAPPER — the outer shell of each phone
    ============================================================ */
    .phone {
      width: var(--phone-width);      /* Use our CSS variable */
      height: var(--phone-height);
      border-radius: var(--phone-radius);
      position: relative;             /* Needed so children can use position: absolute */
      overflow: hidden;               /* Clips anything that goes outside the rounded corners */
      cursor: pointer;

      /* 
        The iPhone body — dark frame with metallic border effect
        We layer multiple box-shadows for depth:
        - inset shadow for inner glow
        - outer shadows for the "raised" look
      */
      background: #1a1a1a;
      border: 2px solid #3a3a3c;

      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),  /* inner highlight */
        0 0 0 3px #2c2c2e,                        /* metal band */
        0 0 0 5px #3a3a3c,                        /* outer band */
        0 40px 80px rgba(0,0,0,0.8),              /* deep drop shadow */
        0 10px 30px rgba(0,0,0,0.5);

      /* CSS transition: smoothly animate any property changes */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Hover effect on the whole phone */
    .phone:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.1),
        0 0 0 3px #2c2c2e,
        0 0 0 5px #3a3a3c,
        0 60px 100px rgba(0,0,0,0.9),
        0 20px 40px rgba(0,0,0,0.6);
    }

    /* ============================================================
       NOTCH — the black cutout at the top of the iPhone
       Uses absolute positioning to sit at the top center
    ============================================================ */
    .notch {
      position: absolute; /* Positioned relative to .phone */
      top: 0;
      left: 50%;
      transform: translateX(-50%); /* Center it: move left by 50% of its OWN width */
      width: 130px;
      height: 28px;
      background: #000;
      border-radius: 0 0 20px 20px; /* Only round bottom corners */
      z-index: 10; /* Stack above everything else */
    }

    /* ============================================================
       SCREEN — the glass display inside the phone
    ============================================================ */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: var(--phone-radius);
      overflow: hidden;

      /* Multi-stop gradient mimics the wallpaper from the image */
      background: linear-gradient(
        160deg,
        #f7c94b 0%,
        #f5a623 20%,
        #e8533a 45%,
        #9b3fa0 75%,
        #5b2d8e 100%
      );
    }

    /* ============================================================
       STATUS BAR — time, wifi, battery at top
    ============================================================ */
    .status-bar {
      position: relative;
      z-index: 5;
      height: var(--status-bar-height);
      display: flex;
      justify-content: space-between; /* Push left and right groups apart */
      align-items: center;
      padding: 0 20px;
      padding-top: 8px;
    }

    .status-time {
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
    }

    /* 
      The right side of the status bar groups wifi, signal, battery.
      flex + gap creates a neat row with spacing.
    */
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      font-size: 12px;
    }

    /* Battery icon is a special pill shape */
    .battery {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .battery-body {
      width: 22px;
      height: 11px;
      border: 1.5px solid white;
      border-radius: 3px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 1.5px;
    }
    .battery-fill {
      height: 100%;
      width: 70%;
      background: #4cd964; /* Green = charged */
      border-radius: 1px;
    }
    /* The small nub on the right of the battery */
    .battery-nub {
      width: 2px;
      height: 5px;
      background: white;
      border-radius: 0 1px 1px 0;
      margin-left: 1px;
    }

    /* ============================================================
       LOCK SCREEN — shown by default
    ============================================================ */
    .lock-screen {
      position: absolute;
      inset: 0; /* shorthand for top/right/bottom/left: 0 */
      display: flex;
      flex-direction: column; /* Stack children vertically */
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .lock-date {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* Big clock */
    .lock-time {
      font-size: 76px;
      font-weight: 200;
      color: white;
      line-height: 1;
      letter-spacing: -2px;
      /* 
        text-shadow: offsetX offsetY blur color
        Adds a soft glow behind the time text
      */
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    /* Lock screen bottom controls */
    .lock-controls {
      position: absolute;
      bottom: 50px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 0 40px;
    }

    .lock-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%; /* Makes a circle */
      /* 
        backdrop-filter: blur() — frosted glass effect.
        Blurs whatever is BEHIND the element.
        Very modern, iOS-style look.
      */
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); /* Safari prefix */
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .lock-btn:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.3);
    }

    /* Swipe hint text */
    .swipe-hint {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
      text-transform: uppercase;
      /* Pulsing animation using @keyframes (defined below) */
      animation: pulse 2s ease-in-out infinite;
    }

    /* ============================================================
       HOME SCREEN — shown after unlock
    ============================================================ */
    .home-screen {
      position: absolute;
      inset: 0;
      /* Hidden by default using opacity + pointer-events trick */
      opacity: 0;
      pointer-events: none; /* Can't click when invisible */
      /* 
        transition: smooth fade between states
        We toggle opacity instead of display:none so we can animate it
      */
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
    }

    /* When the phone has class "unlocked", show home screen */
    .phone.unlocked .home-screen {
      opacity: 1;
      pointer-events: all;
    }
    /* And hide lock screen */
    .phone.unlocked .lock-screen {
      opacity: 0;
      pointer-events: none;
    }
    .lock-screen {
      transition: opacity 0.4s ease;
    }

    /* ============================================================
       APP GRID
    ============================================================ */
    .app-grid {
      flex: 1; /* Takes up all remaining space */
      padding: 50px 16px 16px;
      /* 
        CSS Grid: divides space into rows and columns.
        grid-template-columns: repeat(4, 1fr) = 4 equal columns
        gap: spacing between cells
      */
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, auto);
      gap: 16px 12px;
      align-content: start;
    }

    /* ============================================================
       APP ICON — each individual app
    ============================================================ */
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      /* Small scale animation on hover */
      transition: transform 0.15s ease;
    }
    .app-icon:hover {
      transform: scale(1.12);
    }
    .app-icon:active {
      transform: scale(0.92); /* "Press" effect on click */
    }

    /* The colored square of each app */
    .app-icon-img {
      width: 56px;
      height: 56px;
      border-radius: 14px; /* iOS squircle-like radius */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
      /* Subtle inner shadow for depth */
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.3);
      /* Transition for hover effect */
      transition: box-shadow 0.15s;
    }
    .app-icon:hover .app-icon-img {
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), 0 6px 16px rgba(0,0,0,0.5);
    }

    /* App label */
    .app-label {
      font-size: 10px;
      color: white;
      font-weight: 600;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      white-space: nowrap; /* Don't wrap text */
      overflow: hidden;
      text-overflow: ellipsis; /* ... if text is too long */
      max-width: 62px;
    }

    /* Notification badge (the red dot with number) */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff3b30;
      color: white;
      font-size: 9px;
      font-weight: 800;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255,255,255,0.3);
    }

    /* Wrapper to position badge relative to the icon */
    .app-icon-wrapper {
      position: relative; /* Badge is absolute inside this */
    }

    /* ============================================================
       DOCK — the bottom bar with pinned apps
    ============================================================ */
    .dock {
      margin: 0 14px 30px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    /* Dock icons are slightly larger */
    .dock .app-icon-img {
      width: 58px;
      height: 58px;
    }

    /* ============================================================
       HOME INDICATOR — the little bar at the bottom
    ============================================================ */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.5);
      border-radius: 2px;
    }

    /* ============================================================
       PAGE DOTS — the dots showing which home page you're on
    ============================================================ */
    .page-dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding-bottom: 8px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.3s;
    }
    .dot.active {
      background: white;
    }

    /* ============================================================
       APP OPEN OVERLAY — shown when an app is tapped
    ============================================================ */
    .app-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      border-radius: var(--phone-radius);
      overflow: hidden;
    }
    .app-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .app-overlay-icon {
      font-size: 60px;
      margin-bottom: 16px;
    }
    .app-overlay-name {
      color: white;
      font-size: 22px;
      font-weight: 700;
    }
    .app-overlay-sub {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 6px;
    }
    .app-back-btn {
      margin-top: 30px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.2s;
    }
    .app-back-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    /* ============================================================
       @KEYFRAMES — define named animations
       We reference these with animation: name duration timing
    ============================================================ */
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }   /* Start and end at 60% opacity */
      50%       { opacity: 1; }    /* Fade up to full at midpoint */
    }

    /* Floating shimmer effect on lock screen time */
    @keyframes shimmer {
      0%   { text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
      50%  { text-shadow: 0 2px 40px rgba(255,200,100,0.4); }
      100% { text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
    }
    .lock-time {
      animation: shimmer 4s ease-in-out infinite;
    }

    /* ============================================================
       LABEL UNDER PHONE
    ============================================================ */
    .phone-label {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .phone-container {
      position: relative;
    }
  </style>
</head>

<body>

  <!-- ============================================================
    PHONE 1 — LOCK SCREEN
    This phone shows the lock screen. Click it to "unlock".
  ============================================================ -->
  <div class="phone-container">
    <div class="phone" id="phone1" onclick="unlock(this)">

      <!-- Notch cutout -->
      <div class="notch"></div>

      <!-- The screen gradient background -->
      <div class="screen">

        <!-- ── STATUS BAR ── -->
        <div class="status-bar">
          <span class="status-time">9:45</span>
          <div class="status-icons">
            <!-- Font Awesome icons: fa-solid fa-wifi, fa-signal, etc. -->
            <i class="fa-solid fa-signal" style="font-size:11px;"></i>
            <i class="fa-solid fa-wifi" style="font-size:11px;"></i>
            <!-- Custom battery shape (no image used!) -->
            <div class="battery">
              <div class="battery-body">
                <div class="battery-fill"></div>
              </div>
              <div class="battery-nub"></div>
            </div>
          </div>
        </div>

        <!-- ── LOCK SCREEN CONTENT ── -->
        <div class="lock-screen">
          <div class="lock-date">Wednesday, October 28</div>
          <div class="lock-time">9:45</div>

          <!-- Bottom buttons: flashlight and camera -->
          <div class="lock-controls">
            <div class="lock-btn">
              <i class="fa-solid fa-flashlight" style="font-size:16px;">&#x26A1;</i>
            </div>
            <div class="lock-btn">
              <i class="fa-solid fa-camera"></i>
            </div>
          </div>

          <div class="swipe-hint">Tap to unlock</div>
        </div>

        <!-- ── HOME SCREEN (hidden until unlocked) ── -->
        <div class="home-screen">
          <!-- App Grid -->
          <div class="app-grid" id="grid1">
            <!-- Apps are injected by JavaScript below -->
          </div>

          <!-- Page indicator dots -->
          <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
          </div>

          <!-- Dock -->
          <div class="dock" id="dock1"></div>
        </div>

        <!-- App open overlay (shown when you tap an app) -->
        <div class="app-overlay" id="overlay1">
          <div class="app-overlay-icon" id="overlay1-icon"></div>
          <div class="app-overlay-name" id="overlay1-name"></div>
          <div class="app-overlay-sub">This is a demo app</div>
          <button class="app-back-btn" onclick="closeApp('overlay1')">← Back to Home</button>
        </div>

        <!-- Home indicator bar -->
        <div class="home-indicator"></div>
      </div>
    </div>
    <div class="phone-label">Lock Screen → Home</div>
  </div>


  <!-- ============================================================
    PHONE 2 — HOME SCREEN
    This phone starts already unlocked showing the home screen.
  ============================================================ -->
  <div class="phone-container">
    <div class="phone unlocked" id="phone2">

      <div class="notch"></div>

      <div class="screen">

        <!-- ── STATUS BAR ── -->
        <div class="status-bar">
          <span class="status-time">9:45</span>
          <div class="status-icons">
            <i class="fa-solid fa-signal" style="font-size:11px;"></i>
            <i class="fa-solid fa-wifi" style="font-size:11px;"></i>
            <div class="battery">
              <div class="battery-body">
                <div class="battery-fill"></div>
              </div>
              <div class="battery-nub"></div>
            </div>
          </div>
        </div>

        <!-- ── HOME SCREEN ── -->
        <div class="home-screen" style="opacity:1; pointer-events:all;">
          <div class="app-grid" id="grid2"></div>
          <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
          </div>
          <div class="dock" id="dock2"></div>
        </div>

        <!-- App open overlay -->
        <div class="app-overlay" id="overlay2">
          <div class="app-overlay-icon" id="overlay2-icon"></div>
          <div class="app-overlay-name" id="overlay2-name"></div>
          <div class="app-overlay-sub">This is a demo app</div>
          <button class="app-back-btn" onclick="closeApp('overlay2')">← Back to Home</button>
        </div>

        <div class="home-indicator"></div>
      </div>
    </div>
    <div class="phone-label">Home Screen (Unlocked)</div>
  </div>


  <!-- ============================================================
    JAVASCRIPT
    Handles: live clock, building app icons, unlock, open/close apps
  ============================================================ -->
  <script>

    // ============================================================
    // APP DATA
    // An array of objects. Each object = one app.
    // Arrays hold lists of items. Objects hold key-value pairs.
    // ============================================================
    const apps = [
      { name: "Camera",     icon: "fa-camera",         color: "#1c1c1e",  bg: "linear-gradient(135deg,#2c2c2e,#1c1c1e)" },
      { name: "Photos",     icon: "fa-image",          color: "#fff",     bg: "linear-gradient(135deg,#ff9500,#ff3b30,#af52de)" },
      { name: "Mail",       icon: "fa-envelope",       color: "#fff",     bg: "linear-gradient(135deg,#147EFB,#0a60e0)" },
      { name: "Clock",      icon: "fa-clock",          color: "#fff",     bg: "linear-gradient(135deg,#1c1c1e,#2c2c2e)", badge: "2" },
      { name: "Testflight", icon: "fa-star",           color: "#fff",     bg: "linear-gradient(135deg,#147EFB,#0a60e0)" },
      { name: "Apple",      icon: "fa-apple",          color: "#fff",     bg: "#000" },
      { name: "AppStore",   icon: "fa-bag-shopping",   color: "#fff",     bg: "linear-gradient(135deg,#147EFB,#007aff)" },
      { name: "Phone",      icon: "fa-phone",          color: "#fff",     bg: "linear-gradient(135deg,#34c759,#28a745)" },
      { name: "Podcasts",   icon: "fa-podcast",        color: "#fff",     bg: "linear-gradient(135deg,#bf5af2,#9b59b6)" },
      { name: "Music",      icon: "fa-music",          color: "#fff",     bg: "linear-gradient(135deg,#fc3158,#ff2d55)" },
      { name: "Messages",   icon: "fa-comment",        color: "#fff",     bg: "linear-gradient(135deg,#34c759,#28a745)", badge: "5" },
      { name: "Health",     icon: "fa-heart",          color: "#fff",     bg: "linear-gradient(135deg,#ff2d55,#fc3158)" },
      { name: "Xbox",       icon: "fa-gamepad",        color: "#fff",     bg: "linear-gradient(135deg,#107c10,#0e6b0e)" },
      { name: "Playstation",icon: "fa-circle",         color: "#fff",     bg: "linear-gradient(135deg,#003087,#0050a0)" },
      { name: "Signal",     icon: "fa-signal-messenger",color:"#fff",     bg: "linear-gradient(135deg,#3a76f0,#2563eb)" },
      { name: "Spotify",    icon: "fa-spotify",        color: "#fff",     bg: "linear-gradient(135deg,#1db954,#18a349)", isBrands: true },
    ];

    // Dock apps (the 4 at the bottom)
    const dockApps = [
      { name: "Phone",    icon: "fa-phone",    color: "#fff", bg: "linear-gradient(135deg,#34c759,#28a745)" },
      { name: "Music",    icon: "fa-music",    color: "#fff", bg: "linear-gradient(135deg,#fc3158,#ff2d55)" },
      { name: "Messages", icon: "fa-comment",  color: "#fff", bg: "linear-gradient(135deg,#34c759,#28a745)" },
      { name: "FaceTime", icon: "fa-video",    color: "#fff", bg: "linear-gradient(135deg,#34c759,#28a745)" },
    ];

    // ============================================================
    // buildGrid(containerId, appList, overlayId)
    // This FUNCTION generates the HTML for app icons dynamically.
    // A function is a reusable block of code — call it with different
    // arguments and it does the same thing with different data.
    // ============================================================
    function buildGrid(containerId, appList, overlayId) {
      // getElementById finds an element in the HTML by its id attribute
      const container = document.getElementById(containerId);

      // .map() loops over every item in the array and returns a new array
      // Here we turn each app object into an HTML string
      const html = appList.map((app, index) => {
        // Determine the icon prefix (fa-brands for brand icons like Spotify)
        const prefix = app.isBrands ? 'fa-brands' : 'fa-solid';

        // Template literals (backticks) let us embed variables in strings with ${}
        return `
          <div class="app-icon" onclick="openApp('${overlayId}', '${app.icon}', '${app.name}', '${prefix}', '${app.bg}')">
            <div class="app-icon-wrapper">
              <div class="app-icon-img" style="background: ${app.bg};">
                <i class="${prefix} ${app.icon}" style="color: ${app.color || 'white'};"></i>
              </div>
              ${app.badge ? `<div class="badge">${app.badge}</div>` : ''}
            </div>
            <span class="app-label">${app.name}</span>
          </div>
        `;
        // ${app.badge ? ... : ''} is a ternary — shorthand if/else
        // condition ? valueIfTrue : valueIfFalse
      }).join(''); // .join('') merges the array of strings into one string

      // Set the innerHTML to inject our generated HTML into the page
      container.innerHTML = html;
    }

    // ============================================================
    // UNLOCK — called when lock screen is tapped
    // ============================================================
    function unlock(phoneEl) {
      // classList.add adds a CSS class to an element
      // This triggers the CSS rule: .phone.unlocked .home-screen { opacity: 1 }
      phoneEl.classList.add('unlocked');
    }

    // ============================================================
    // OPEN APP — shows the overlay when an app is tapped
    // ============================================================
    function openApp(overlayId, iconClass, appName, prefix, bg) {
      const overlay = document.getElementById(overlayId);
      const iconEl = document.getElementById(overlayId + '-icon');
      const nameEl = document.getElementById(overlayId + '-name');

      // Set the background of overlay to match the app's color
      overlay.style.background = bg;

      // Inject the icon HTML
      iconEl.innerHTML = `<i class="${prefix} ${iconClass}" style="font-size:60px; color:white;"></i>`;
      nameEl.textContent = appName; // textContent sets plain text (safer than innerHTML)

      // Add the 'open' class to trigger the CSS transition (opacity: 1)
      overlay.classList.add('open');
    }

    // ============================================================
    // CLOSE APP — hides the overlay
    // event.stopPropagation() prevents click from bubbling up
    // (so it doesn't accidentally trigger the phone's unlock click)
    // ============================================================
    function closeApp(overlayId) {
      document.getElementById(overlayId).classList.remove('open');
    }

    // ============================================================
    // LIVE CLOCK — updates every second using setInterval
    // setInterval(function, ms) runs a function every N milliseconds
    // ============================================================
    function updateClock() {
      // new Date() gives us the current date and time
      const now = new Date();

      // .getHours() and .getMinutes() return numbers
      let h = now.getHours();
      let m = now.getMinutes();

      // Pad minutes with a leading zero if needed (e.g., "9:05" not "9:5")
      // String(m) converts number to string, .padStart(2, '0') adds leading zero
      m = String(m).padStart(2, '0');

      const timeStr = `${h}:${m}`;

      // Update ALL elements with class 'status-time' on the page
      document.querySelectorAll('.status-time').forEach(el => {
        el.textContent = timeStr;
      });

      // Also update the big lock screen clock
      const lockTimes = document.querySelectorAll('.lock-time');
      lockTimes.forEach(el => el.textContent = timeStr);
    }

    // Run updateClock immediately, then every 10 seconds
    updateClock();
    setInterval(updateClock, 10000);

    // ============================================================
    // BUILD BOTH PHONES
    // Call our buildGrid function for each phone's grid and dock
    // ============================================================
    buildGrid('grid1', apps, 'overlay1');
    buildGrid('dock1', dockApps, 'overlay1');
    buildGrid('grid2', apps, 'overlay2');
    buildGrid('dock2', dockApps, 'overlay2');

  </script>

</body>
</html>
