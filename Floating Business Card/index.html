<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">
    <div class="card">

      <!-- Avatar -->
      <div class="avatar-wrapper">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Faraz" alt="Avatar" class="avatar-img">
      </div>

      <!-- Name & Role -->
      <h1 class="name">Omar Azim</h1>
      <p class="role">Web Developer / Game Developer</p>

      <!-- Social Icons -->
      <div class="socials">
        <a href="#" class="social-link linkedin"><i class="fab fa-linkedin-in"></i></a>
        <a href="#" class="social-link twitter"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-link github"><i class="fab fa-github"></i></a>
      </div>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Contact Info -->
      <div class="contact">
        <p><span class="label">Email:</span> omarazim754@gmail.com</p>
        <p><span class="label">Phone:</span> +123 456 7890</p>
        <p><span class="label">Website:</span> www.omarsworld.dev</p>
      </div>

    </div>
  </div>

</body>
</html>
