            <br>
            <p class="arabic">أَللَّهُمَّ إِنّي أَخافُكَ ، وَأَخافُ مِمَّنْ يَخافُكَ ، وَأَعُوذُ بِكَ مِمَّنْ لايَخافُكَ
                .
            </p>
            <br>
            <p class="translation">O’ Allah, indeed I fear You and fear those who fear You, and I seek refuge in You from those who do not fear You.</p>
